<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCm Bridge - CUDA to ROCm Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1000px;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .convert-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .convert-btn:active {
            transform: translateY(0);
        }

        .clear-btn {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .copy-btn {
            background: #4caf50;
            color: white;
        }

        .copy-btn:hover {
            background: #45a049;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.loading {
            background: #e2e3e5;
            color: #383d41;
            border: 1px solid #d6d8db;
        }

        .info-box {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .info-box p {
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 ROCm Bridge</h1>
        <p class="subtitle">AI-Powered CUDA to ROCm Code Converter</p>

        <div class="info-box">
            <p><strong>How it works:</strong> Paste your CUDA code on the left, click "Convert", and receive ROCm-compatible code on the right instantly!</p>
        </div>

        <div class="content">
            <div class="panel">
                <div class="panel-title">CUDA Code (Input)</div>
                <textarea id="cudaInput" placeholder="Paste your CUDA code here...&#10;&#10;Example:&#10;__global__ void kernel() {&#10;    int idx = blockIdx.x * blockDim.x + threadIdx.x;&#10;}"></textarea>
            </div>

            <div class="panel">
                <div class="panel-title">ROCm Code (Output)</div>
                <textarea id="rocmOutput" placeholder="Your converted ROCm code will appear here..." readonly></textarea>
            </div>
        </div>

        <div class="button-group">
            <button class="convert-btn" onclick="convertCode()">⚡ Convert to ROCm</button>
            <button class="clear-btn" onclick="clearAll()">🗑️ Clear All</button>
            <button class="copy-btn" onclick="copyToClipboard()">📋 Copy Output</button>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script>
        const API_URL = "http://localhost:8000"; // Change this when deploying

        async function convertCode() {
            const cudaCode = document.getElementById("cudaInput").value.trim();
            const statusDiv = document.getElementById("status");

            if (!cudaCode) {
                showStatus("Please paste CUDA code first!", "error");
                return;
            }

            showStatus("Converting... Please wait ⏳", "loading");

            try {
                const response = await fetch(`${API_URL}/convert`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ cuda_code: cudaCode }),
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById("rocmOutput").value = data.rocm_code;
                    showStatus("✅ Conversion successful!", "success");
                } else {
                    showStatus("❌ " + data.error, "error");
                }
            } catch (error) {
                showStatus("❌ Error: Could not connect to backend. Make sure it's running on port 8000.", "error");
            }
        }

        function clearAll() {
            document.getElementById("cudaInput").value = "";
            document.getElementById("rocmOutput").value = "";
            document.getElementById("status").classList.remove("show");
        }

        function copyToClipboard() {
            const rocmCode = document.getElementById("rocmOutput").value;
            if (!rocmCode) {
                showStatus("Nothing to copy!", "error");
                return;
            }
            navigator.clipboard.writeText(rocmCode).then(() => {
                showStatus("✅ Copied to clipboard!", "success");
            });
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById("status");
            statusDiv.textContent = message;
            statusDiv.className = `status show ${type}`;
        }

        // Check if backend is running on page load
        window.addEventListener("load", async () => {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    console.log("✅ Backend is running!");
                }
            } catch {
                console.warn("⚠️ Backend not connected. Make sure to run: python backend.py");
            }
        });
    </script>
</body>
                  </html>
